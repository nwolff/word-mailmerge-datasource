<!DOCTYPE html>
<html lang="en">

<head>
    <title>MailMerge Datasource viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://unpkg.com/dropzone@5/dist/min/dropzone.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/dropzone@5/dist/min/dropzone.min.css" type="text/css" />
</head>


<body>
<div id="content" class="container">
    <h2>Find out the filters and orderings used in a mailmerge</h2>

    <form action="upload" class="dropzone" id="mydropzone">
		<div class="dz-message" data-dz-message><span>Drop docx or dotx (unmerged) mailmerge files</span></div>
    </form>

    <script>
  Dropzone.options.mydropzone = {
    acceptedFiles: ".doc,.docx,.dotx,.xml,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document",
    addRemoveLinks: true,
    init: function() {
        this.on("success", (file, responseText) => {
            file.previewTemplate.appendChild(document.createTextNode(responseText));
        });
    },
  };
    </script>
</div>
</body>
